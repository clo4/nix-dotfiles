set  -g default-terminal "tmux-256color"
set  -g base-index      1
setw -g pane-base-index 1
set  -g status-keys emacs
set  -g mode-keys   emacs
set  -g mouse             on
set  -g focus-events      off
setw -g aggressive-resize off
setw -g clock-mode-style  12
set  -s escape-time       10
set  -g history-limit     50000
set  -g set-titles         on
set  -g set-titles-string  "#S / #W"
set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -g focus-events on
set -g renumber-windows on

set -as terminal-features ',*:RGB'

# Status bar (gruvbox)
set  -g status-position top
set -g status-style              "bg=default,fg=white"
set -g status-left               ""
set -g status-right              "#[fg=brightblack]#S "
set -g status-justify            left

set -g window-status-format         "  #I:#W  "
set -g window-status-current-format "  #I:#W  "
set -g window-status-style          "fg=brightblack"
set -g window-status-current-style  "fg=black,bg=yellow,bold"
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style         "fg=brightblack"
set -g pane-active-border-style  "fg=yellow,bold"
set -g pane-border-lines         single
set -g pane-border-indicators    both

# Keybindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind -T copy-mode MouseDown1Pane select-pane \; send-keys -X clear-selection
